# Cloudflare Worker deploy config. Lets you run `wrangler deploy` instead of
# pasting worker/index.js into the dashboard — every deploy becomes a reviewable
# git diff, and `npm run deploy` runs the syntax gate + tests first (predeploy).
#
# ─────────────────────────────────────────────────────────────────────────────
# BEFORE YOUR FIRST `wrangler deploy`, verify these against the live worker:
#   Cloudflare dashboard → Workers → planaria-people-worker → Settings.
# `wrangler deploy` REPLACES the worker's bindings + compatibility settings with
# what's in THIS file. Secrets are NOT touched (they persist across deploys), but
# the browser binding and compatibility date/flags below must match what the live
# worker already uses, or PDF rendering can break. If unsure, paste-deploy still
# works as a fallback — this file is additive, it doesn't remove that option.
# ─────────────────────────────────────────────────────────────────────────────

name = "planaria-people-worker"
main = "worker/index.js"

# Match the date shown in the dashboard's Settings → Compatibility. This is a
# recent, browser-rendering-safe default; change it only to match the live worker.
compatibility_date = "2024-09-23"

# The worker imports `node:buffer`; nodejs_compat is required for it to run.
compatibility_flags = ["nodejs_compat"]

# Cloudflare browser rendering, used by renderPdf() for all PDF attachments.
# `env.MYBROWSER` in the code binds to this. Must stay declared or deploying via
# wrangler would drop the binding and every PDF render would throw.
browser = { binding = "MYBROWSER" }

# Secrets (NOT stored here — set once via the dashboard or `wrangler secret put`):
#   SUPABASE_URL, SUPABASE_SERVICE_KEY, CLICKUP_TOKEN, CLICKUP_LIST_ID,
#   CLICKUP_SPACE_ID, CONFIG_SYNC_TOKEN, SHEET_WEBHOOK_URL, PEER_ADMIN_KEY,
#   PEER_VIEW_KEY (optional)
# They survive `wrangler deploy` untouched.
