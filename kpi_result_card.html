<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI Result</title>
<style>
:root{
/* ===== SHARED VISUAL CONTRACT — identical across all six People System files ===== */
--canvas:#f7f7f8;--card:#fff;--ink:#17191d;--muted:#6b7280;--line:#e6e8eb;
--kpi:#4f46e5;--peer:#0d9488;--pip:#b45309;
--lo:#e0603b;--mid:#e3a008;--mid-ink:#b45309;--hi:#2f9e7e;--lo-bg:#fbeae5;--hi-bg:#e9f6f1;}
*{box-sizing:border-box}
:focus-visible{outline:2px solid var(--kpi);outline-offset:2px}
body{margin:0;background:var(--canvas);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;font-feature-settings:"tnum" 1}
.page{max-width:860px;margin:0 auto;padding:32px 22px 80px}
.print{text-align:right;max-width:860px;margin:0 auto;padding:0 22px}
.pbtn{font:inherit;font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer;margin-bottom:10px}
.empty{max-width:860px;margin:15vh auto 0;text-align:center;color:var(--muted);font-size:14px}
@media print{body{background:#fff}.print{display:none}.kpicard .doc{border:none}}
</style>
<!-- card markup + styles live in kpi_card.js so this page and the scorecard's
     pre-file preview can never drift apart -->
<script src="kpi_card.js"></script>
<script>document.write('<style>'+window.KPICARD.css+'</style>');</script>
</head><body>
<div class="print"><button class="pbtn" id="pdfBtn" onclick="window.print()">Save as PDF ↗</button></div>
<div id="root"><div class="empty">Loading…</div></div>
<script>
const WORKER_URL='https://planaria-people-worker.planariastudio.workers.dev';
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

(async function boot(){
  const id=new URLSearchParams(location.search).get('kpi');
  if(!id){document.getElementById('root').innerHTML='<div class="empty">No case specified — open this page with <code>?kpi=&lt;case id&gt;</code>.</div>';document.getElementById('pdfBtn').style.display='none';return;}
  try{
    const r=await fetch(`${WORKER_URL}/kpi/${encodeURIComponent(id)}`);
    const j=await r.json();
    if(!j.found||!j.case.finalized||!j.case.detail){
      document.getElementById('root').innerHTML=`<div class="empty">Case <b>${esc(id)}</b> hasn't been filed yet — there's no result card until a supervisor files it.</div>`;
      document.getElementById('pdfBtn').style.display='none';
      return;
    }
    document.title=`KPI Result · ${j.case.detail.editor||id}`;
    document.getElementById('root').innerHTML='<div class="page"><div class="kpicard">'+window.KPICARD.html(j.case.detail)+'</div></div>';
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="empty">Failed to load: ${esc(e.message)}</div>`;
    document.getElementById('pdfBtn').style.display='none';
  }
})();
</script>
</body></html>
