<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peer Scorecard</title>
<style>
:root{
/* ===== SHARED VISUAL CONTRACT — identical across all six People System files ===== */
--canvas:#f7f7f8;--card:#fff;--ink:#17191d;--muted:#6b7280;--line:#e6e8eb;
--kpi:#4f46e5;--peer:#0d9488;--pip:#b45309;--peer-bg:#e9f6f4;
--lo:#e0603b;--mid:#e3a008;--mid-ink:#b45309;--hi:#2f9e7e;}
*{box-sizing:border-box}
:focus-visible{outline:2px solid var(--peer);outline-offset:2px}
body{margin:0;background:var(--canvas);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;font-feature-settings:"tnum" 1}
.wrap{max-width:820px;margin:0 auto;padding:32px 22px 80px}
.print{text-align:right}.pbtn{font:inherit;font-size:12px;font-weight:600;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 13px;cursor:pointer;margin-bottom:10px}
.doc{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--peer);border-radius:14px;overflow:hidden}
/* page chrome only -- the "Load a scorecard" bar and loading/error placeholders,
   which render outside the shared peer_card.js module. The report content itself
   (head, overall medal, clusters, values, etc.) is styled by peer_card.js so this
   page and the ClickUp PDF can never drift apart -- see peer_card.js. */
.section{padding:22px 26px;border-bottom:1px solid var(--line)}.section:last-child{border-bottom:none}
.loadbar{background:var(--peer-bg)}
.stitle{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:0 0 14px}
@media print{body{background:#fff}.print{display:none}.doc{border:none}}
</style>
<script src="peer_card.js"></script>
<script>document.write('<style>'+window.PEERCARD.css+'</style>');</script>
</head><body>
<div class="wrap">
<div class="print"><button class="pbtn" onclick="window.print()">Save as PDF ↗</button></div>
<div class="doc" id="doc"></div>
</div>
<script>
const WORKER_URL='https://planaria-people-worker.planariastudio.workers.dev';
const doc=document.getElementById('doc');
const params=new URLSearchParams(location.search);
const VIEW_KEY=params.get('key')||'';

async function fetchWithRetry(url,tries=4,delayMs=700){
  let e;for(let i=0;i<tries;i++){try{const r=await fetch(url);if(!r.ok&&r.status>=500)throw new Error('HTTP '+r.status);return r;}catch(x){e=x;if(i<tries-1)await new Promise(rs=>setTimeout(rs,delayMs*(i+1)));}}throw e;
}

function pickerHtml(roster,selSlug,cycle){
 const opts=roster.map(r=>`<option value="${r.id}" ${r.id===selSlug?'selected':''}>${r.name}</option>`).join('');
 const cm=/Q([1-4])\s+(\d{4})/.exec(cycle||'');const cq=cm?('Q'+cm[1]):'';const cyy=cm?cm[2]:'';
 const qopts=['Q1','Q2','Q3','Q4'].map(q=>`<option ${q===cq?'selected':''}>${q}</option>`).join('');
 return `<div class="section loadbar print"><div class="stitle">Load a scorecard</div>
   <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
     <div style="flex:1;min-width:180px"><label style="display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Peer</label>
       <select id="gvTarget" style="width:100%;font:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff"><option value="">— select —</option>${opts}</select></div>
     <div style="width:190px"><label style="display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px">Cycle</label>
       <div style="display:flex;gap:6px">
         <select id="gvCycleQ" style="flex:0 0 76px;font:inherit;font-size:13.5px;padding:9px 8px;border:1px solid var(--line);border-radius:9px;background:#fff"><option value="">Q…</option>${qopts}</select>
         <input id="gvCycleY" inputmode="numeric" maxlength="4" placeholder="Year" value="${cyy}" style="flex:1;min-width:0;font:inherit;font-size:13.5px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fff"></div></div>
     <div style="flex:0 0 auto"><label style="display:block;font-size:11px;font-weight:600;color:transparent;margin-bottom:5px" aria-hidden="true">·</label>
       <button id="gvLoad" class="pbtn" style="margin-bottom:0;padding:10px 18px;white-space:nowrap;background:var(--peer);color:#fff;border-color:var(--peer);font-weight:650">Load</button></div>
   </div></div>`;
}

let ROSTER=[];
async function boot(){
  doc.innerHTML='<div class="section"><div class="stitle">Loading…</div></div>';
  try{
    const cfg=await (await fetchWithRetry(`${WORKER_URL}/config`)).json();
    ROSTER=cfg.roster.map(r=>({id:r.id,name:r.name,level:r.level}));
  }catch(e){doc.innerHTML='<div class="section"><div class="stitle" style="color:var(--lo)">Failed to load config</div><p>'+e.message+'</p></div>';return;}
  const now=new Date();const defCycle='Q'+(Math.floor(now.getMonth()/3)+1)+' '+now.getFullYear();
  const t=params.get('target')||'',c=params.get('cycle')||defCycle;
  shell(t,c);
  if(t)load(t,c);
}
function shell(selSlug,cycle){
  doc.innerHTML=pickerHtml(ROSTER,selSlug,cycle)+'<div id="gvBody"><div class="section"><div class="stitle">Pick a peer + cycle</div><p style="font-size:13px;color:var(--muted)">The pooled scorecard loads here. Nothing is attributed to any rater.</p></div></div>';
  const gvCycleVal=()=>{const q=document.getElementById('gvCycleQ'),y=document.getElementById('gvCycleY');return (q.value&&y.value.length===4)?(q.value+' '+y.value):'';};
  document.getElementById('gvLoad').onclick=()=>{
    const s=document.getElementById('gvTarget').value,cy=gvCycleVal();
    if(!s||!cy){alert('Pick a peer, a quarter, and a 4-digit year first.');return;}
    const u=new URL(location.href);u.searchParams.set('target',s);u.searchParams.set('cycle',cy);history.replaceState(null,'',u);
    load(s,cy);
  };
  document.getElementById('gvCycleY').addEventListener('input',e=>{e.target.value=e.target.value.replace(/\D/g,'').slice(0,4);});
}
async function load(slug,cycle){
  const body=document.getElementById('gvBody');
  body.innerHTML='<div class="section"><div class="stitle">Loading scorecard…</div></div>';
  try{
    const u=`${WORKER_URL}/peer/aggregate?target=${encodeURIComponent(slug)}&cycle=${encodeURIComponent(cycle)}${VIEW_KEY?`&key=${encodeURIComponent(VIEW_KEY)}`:''}`;
    const r=await fetch(u);const j=await r.json();
    if(r.status===403){body.innerHTML='<div class="section"><div class="stitle" style="color:var(--lo)">Access key required</div><p style="font-size:13px">Open this page with your ?key= link from the admin.</p></div>';return;}
    if(!r.ok)throw new Error(j.error||r.status);
    if(j.held){body.innerHTML=`<div class="section"><div class="stitle">Held for confidentiality</div><p style="font-size:13px;color:var(--muted)"><b>${j.n}</b> peer response so far for <b>${cycle}</b>. The pooled scorecard unlocks once at least <b>${j.min_n||2}</b> peers have responded, so no single rating can be traced back to anyone.</p></div>`;return;}
    if(!j.found||!j.n){body.innerHTML=`<div class="section"><div class="stitle">No responses yet</div><p style="font-size:13px;color:var(--muted)">No peer responses recorded for this peer in <b>${cycle}</b>.</p></div>`;return;}
    render(j,body);
  }catch(e){body.innerHTML='<div class="section"><div class="stitle" style="color:var(--lo)">Failed to load</div><p style="font-size:13px">'+e.message+'</p></div>';}
}

// Rendering itself lives in peer_card.js -- shared with the worker's PDF copy so
// this view and the ClickUp attachment can never show different-looking reports
// for the same data. This function only wraps the module's output for the page.
function render(S,body){
  body.innerHTML='<div class="peercard">'+window.PEERCARD.html(S)+'</div>';
}
boot();
</script>
</body></html>
