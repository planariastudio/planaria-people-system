name: Supabase keep-alive

# Pings Supabase daily so the free-tier project never crosses the
# 7-day idle threshold that triggers auto-pause.
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL      e.g. https://xxxxxxxx.supabase.co
#   SUPABASE_ANON_KEY the project's anon/public API key

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC — adjust if you want a specific time
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (lightweight read)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/roster?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ge 400 ]; then
            echo "::error::Supabase ping failed with status $status — check project status manually."
            exit 1
          fi
